sample:
  name: ADP5360 Multi-Function Device Sample
  description: Sample for ADP5360 MFD (Charger, Fuel Gauge, Regulator)
tests:
  sample.drivers.adp5360.charger:
    harness: console
    tags:
      - charger
      - mfd
    integration_platforms:
      - nucleo_u575zi_q
    filter: dt_compat_enabled("adi,adp5360")
    platform_allow: nucleo_u575zi_q
    depends_on: i2c
    harness_config:
      type: multi_line
      regex:
        - "Current Limit:.*uA"
        - "Charger is active"
  sample.drivers.adp5360.fuel_gauge:
    harness: console
    tags:
      - fuel_gauge
      - mfd
    integration_platforms:
      - nucleo_u575zi_q
    filter: dt_compat_enabled("adi,adp5360")
    platform_allow: nucleo_u575zi_q
    depends_on: i2c
    harness_config:
      type: multi_line
      regex:
        - "Fuel gauge Battery Capacity:.*"
        - "Fuel gauge SoC:.*"
  sample.drivers.adp5360.regulator:
    harness: console
    tags:
      - regulator
      - mfd
    integration_platforms:
      - nucleo_u575zi_q
    filter: dt_compat_enabled("adi,adp5360")
    platform_allow: nucleo_u575zi_q
    depends_on: i2c
    harness_config:
      type: multi_line
      regex:
        - "Buck Output Voltage:.*"
        - "Buck Boost Output Voltage:.*"

sample:
  name: Multi-Function Device (MFD) Sample
  description: Sample for generic MFD with Charger, Fuel Gauge, and Regulator support
tests:
  sample.drivers.mfd_charger:
    harness: console
    tags:
      - charger
      - fuel_gauge
      - regulator
      - mfd
    filter: dt_nodelabel_enabled("mfd") and dt_nodelabel_enabled("charger") and
            dt_nodelabel_enabled("fuelgauge") and dt_nodelabel_enabled("buck") and
            dt_nodelabel_enabled("buckboost")
    platform_allow: nucleo_u575zi_q
    harness_config:
      type: multi_line
      regex:
        - "Current.*uA"
        - "Charger is.*"
        - "Fuel gauge.*Capacity"
        - "Fuel gauge SoC"
        - ".*Output Voltage.*"
